                $ref: "#/components/schemas/ErrorEnvelopeDto"
        "409":
          description: Conflict — invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelopeDto"
        "422":
          description: Unprocessable Entity — domain rule violated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelopeDto"
