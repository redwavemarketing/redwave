openapi: 3.0.0
paths:
  /health:
    get:
      operationId: HealthController_check
      parameters: []
      responses:
        "200":
          description: The Health Check is successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  info:
                    type: object
                    example: &a1
                      database: &a2
                        status: up
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  error:
                    type: object
                    example: {}
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  details:
                    type: object
                    example: *a1
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
        "503":
          description: The Health Check is not successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  info:
                    type: object
                    example: *a1
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  error:
                    type: object
                    example:
                      redis: &a3
                        status: down
                        message: Could not connect
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  details:
                    type: object
                    example:
                      database: *a2
                      redis: *a3
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
      tags:
        - Health
  /v1/auth/login:
    post:
      description: Public. Returns { access_token, refresh_token }. Invalid
        credentials → 401.
      operationId: AuthController_login_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "200":
          description: ""
      summary: Authenticate with email + password
      tags: &a4
        - Auth
  /v1/auth/refresh:
    post:
      description: Public. Invalid/expired refresh token → 401.
      operationId: AuthController_refresh_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshDto"
      responses:
        "200":
          description: ""
      summary: Exchange a refresh token for a new access token
      tags: *a4
  /v1/auth/logout:
    post:
      description: Requires authentication. The client discards its tokens; recorded
        for audit.
      operationId: AuthController_logout_v1
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - bearer: []
      summary: Log out (stateless)
      tags: *a4
  /v1/auth/me:
    get:
      description: Requires authentication. Returns the profile, roles, and union of
        permissions.
      operationId: AuthController_me_v1
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - bearer: []
      summary: Current user + effective permissions
      tags: *a4
  /v1/users:
    get:
      description: Requires users:view.
      operationId: UsersController_findAll_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a5
        - bearer: []
      summary: List users
      tags: &a6
        - Users
    post:
      description: Requires users:create.
      operationId: UsersController_create_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserDto"
      responses:
        "201":
          description: ""
      security: *a5
      summary: Create a user and assign roles
      tags: *a6
  /v1/users/{id}:
    get:
      description: Requires users:view.
      operationId: UsersController_findOne_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a5
      summary: Get a user
      tags: *a6
    patch:
      description: Requires users:edit. status=inactive revokes access immediately.
      operationId: UsersController_update_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserDto"
      responses:
        "200":
          description: ""
      security: *a5
      summary: Edit / deactivate a user
      tags: *a6
  /v1/users/{id}/roles:
    put:
      description: Requires users:edit.
      operationId: UsersController_setRoles_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserRolesDto"
      responses:
        "200":
          description: ""
      security: *a5
      summary: Set a user’s roles
      tags: *a6
  /v1/roles:
    get:
      description: Requires roles:view.
      operationId: RolesController_findAll_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a7
        - bearer: []
      summary: List roles
      tags: &a8
        - Roles
    post:
      description: Requires roles:create.
      operationId: RolesController_create_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleDto"
      responses:
        "201":
          description: ""
      security: *a7
      summary: Create a custom role
      tags: *a8
  /v1/roles/{id}:
    get:
      description: Requires roles:view.
      operationId: RolesController_findOne_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a7
      summary: Get a role + its granted permissions
      tags: *a8
    patch:
      description: Requires roles:edit. Built-in roles cannot be renamed.
      operationId: RolesController_update_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleDto"
      responses:
        "200":
          description: ""
      security: *a7
      summary: Rename / edit a role
      tags: *a8
    delete:
      description: Requires roles:delete. Built-in roles → 409.
      operationId: RolesController_remove_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: ""
      security: *a7
      summary: Delete a custom role
      tags: *a8
  /v1/roles/{id}/permissions:
    put:
      description: Requires roles:edit.
      operationId: RolesController_setPermissions_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRolePermissionsDto"
      responses:
        "200":
          description: ""
      security: *a7
      summary: Set a role’s module×action grants
      tags: *a8
  /v1/modules:
    get:
      description: Requires roles:view.
      operationId: RbacCatalogueController_listModules_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a9
        - bearer: []
      summary: List system modules
      tags: &a10
        - Roles
  /v1/permissions:
    get:
      description: Requires roles:view.
      operationId: RbacCatalogueController_listPermissions_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: *a9
      summary: List all (module, action) permissions
      tags: *a10
  /v1/account/profile:
    get:
      description: Authenticated. Flags any change pending review.
      operationId: AccountController_getProfile_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a11
        - bearer: []
      summary: View my profile
      tags: &a12
        - Account
  /v1/account/change-password:
    post:
      description: Authenticated. Verifies the current password.
      operationId: AccountController_changePassword_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordDto"
      responses:
        "200":
          description: ""
      security: *a11
      summary: Change my password
      tags: *a12
  /v1/account/theme:
    patch:
      description: Authenticated. Applies immediately, no review.
      operationId: AccountController_setTheme_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetThemeDto"
      responses:
        "200":
          description: ""
      security: *a11
      summary: Set my theme preference
      tags: *a12
  /v1/account/profile-change-requests:
    post:
      description: Authenticated. Creates a PENDING request; the live profile is not
        changed until approved.
      operationId: AccountController_requestProfileChange_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileChangeRequestDto"
      responses:
        "201":
          description: ""
      security: *a11
      summary: Request a profile HR-field change
      tags: *a12
    get:
      description: Authenticated.
      operationId: AccountController_listMyRequests_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: *a11
      summary: List my profile-change requests
      tags: *a12
  /v1/profile-change-requests:
    get:
      description: Requires profile:approve. Scoped by routing (Field Manager / Admin
        / Super Admin).
      operationId: ProfileChangeReviewController_listQueue_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a13
        - bearer: []
      summary: Review queue of pending profile changes
      tags: &a14
        - Account
  /v1/profile-change-requests/{id}/approve:
    post:
      description: Requires profile:approve + routing authorization.
      operationId: ProfileChangeReviewController_approve_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a13
      summary: Approve a profile change
      tags: *a14
  /v1/profile-change-requests/{id}/reject:
    post:
      description: Requires profile:approve + routing authorization.
      operationId: ProfileChangeReviewController_reject_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a13
      summary: Reject a profile change
      tags: *a14
  /v1/clients:
    get:
      description: Requires clients:view. ?status filter.
      operationId: ClientsController_list_v1
      parameters:
        - name: status
          required: false
          in: query
          schema:
            default: active
            type: string
            enum:
              - active
              - inactive
              - all
      responses:
        "200":
          description: ""
      security: &a15
        - bearer: []
      summary: List clients
      tags: &a16
        - Clients & Products
    post:
      description: Requires clients:create. Unique code → 409.
      operationId: ClientsController_create_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientDto"
      responses:
        "201":
          description: ""
      security: *a15
      summary: Create a client
      tags: *a16
  /v1/clients/{id}:
    get:
      description: Requires clients:view.
      operationId: ClientsController_findOne_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a15
      summary: Get a client
      tags: *a16
    patch:
      description: Requires clients:edit. is_active=false soft-deactivates.
      operationId: ClientsController_update_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientDto"
      responses:
        "200":
          description: ""
      security: *a15
      summary: Edit / deactivate a client
      tags: *a16
  /v1/clients/{id}/products:
    get:
      description: Requires clients:view.
      operationId: ClientsController_listProducts_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: status
          required: false
          in: query
          schema:
            default: active
            type: string
            enum:
              - active
              - inactive
              - all
      responses:
        "200":
          description: ""
      security: *a15
      summary: List a client's products
      tags: *a16
    post:
      description: Requires clients:edit.
      operationId: ClientsController_createProduct_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductDto"
      responses:
        "201":
          description: ""
      security: *a15
      summary: Create a per-client product
      tags: *a16
  /v1/clients/{id}/billing-rates:
    get:
      description: Requires clients:view. ?effectiveOn returns the rate in force per
        scope on a date.
      operationId: ClientsController_listBillingRates_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: effectiveOn
          required: false
          in: query
          description: Return the single rate in force per scope on this date.
          schema:
            type: string
        - name: productId
          required: false
          in: query
          schema:
            type: string
        - name: rateKind
          required: false
          in: query
          schema:
            type: string
            enum:
              - product
              - tv_addon
              - hp_addon
              - bundle_bonus
              - spiff
        - name: status
          required: false
          in: query
          schema:
            default: all
            type: string
            enum:
              - past
              - current
              - pending
              - all
      responses:
        "200":
          description: ""
      security: *a15
      summary: List a client's billing rates (current + pending)
      tags: *a16
    post:
      description: Requires clients:edit. Supersedes the scope’s pending rate;
        back-dating → 422.
      operationId: ClientsController_createBillingRate_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillingRateDto"
      responses:
        "201":
          description: ""
      security: *a15
      summary: Add an effective-dated billing rate
      tags: *a16
  /v1/products/{id}:
    patch:
      description: Requires clients:edit. product_type is immutable; is_active=false
        soft-deactivates.
      operationId: ProductsController_update_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductDto"
      responses:
        "200":
          description: ""
      security:
        - bearer: []
      summary: Edit / deactivate a product
      tags:
        - Clients & Products
  /v1/reps:
    get:
      description: "Requires hrm:view. Filters: status, fieldManagerId, search.
        payment_details redacted unless hrm:edit."
      operationId: RepsController_list_v1
      parameters:
        - name: status
          required: false
          in: query
          schema:
            default: active
            type: string
            enum:
              - active
              - terminated
              - all
        - name: fieldManagerId
          required: false
          in: query
          description: Filter by field manager (user id).
          schema:
            type: string
        - name: search
          required: false
          in: query
          description: Search by name or rep_code (case-insensitive).
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: &a17
        - bearer: []
      summary: List reps
      tags: &a18
        - HRM / Reps
    post:
      description: Requires hrm:create. rep_code never reused → 409.
      operationId: RepsController_create_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepDto"
      responses:
        "201":
          description: ""
      security: *a17
      summary: Create a rep
      tags: *a18
  /v1/reps/{id}:
    get:
      description: Requires hrm:view. payment_details redacted unless hrm:edit.
      operationId: RepsController_findOne_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a17
      summary: Get a rep
      tags: *a18
    patch:
      description: Requires hrm:edit. status=terminated requires termination_date.
        rep_code immutable.
      operationId: RepsController_update_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRepDto"
      responses:
        "200":
          description: ""
      security: *a17
      summary: Edit / set field manager / terminate a rep
      tags: *a18
  /v1/reps/{id}/documents:
    get:
      description: Requires hrm:view. file_url shown only with hrm:edit.
      operationId: RepsController_listDocuments_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a17
      summary: List a rep's documents
      tags: *a18
    post:
      description: Requires hrm:edit. Stores a storage reference.
      operationId: RepsController_createDocument_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepDocumentDto"
      responses:
        "201":
          description: ""
      security: *a17
      summary: Attach a document to a rep
      tags: *a18
  /v1/reps/{id}/equipment:
    get:
      description: Requires hrm:view.
      operationId: RepsController_listEquipment_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a17
      summary: List a rep's equipment
      tags: *a18
    post:
      description: Requires hrm:edit. Deposit is exact Decimal.
      operationId: RepsController_assignEquipment_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepEquipmentDto"
      responses:
        "201":
          description: ""
      security: *a17
      summary: Assign equipment to a rep
      tags: *a18
  /v1/equipment/{id}:
    patch:
      description: Requires hrm:edit. Transition to returned (sets returned_date) or
        withheld.
      operationId: EquipmentController_update_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRepEquipmentDto"
      responses:
        "200":
          description: ""
      security:
        - bearer: []
      summary: Update equipment state
      tags:
        - HRM / Reps
  /v1/commission/tiers:
    get:
      description: Requires commission:view.
      operationId: CommissionController_listTiers_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a19
        - bearer: []
      summary: Tier schedules (current + pending)
      tags: &a20
        - Commission Config
    post:
      description: Requires commission:edit. Supersedes the pending schedule;
        back-dating → 422.
      operationId: CommissionController_createTiers_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTierScheduleDto"
      responses:
        "201":
          description: ""
      security: *a19
      summary: Create a new effective-dated tier schedule
      tags: *a20
  /v1/commission/flat-rates:
    get:
      description: Requires commission:view.
      operationId: CommissionController_listFlatRates_v1
      parameters:
        - name: status
          required: false
          in: query
          schema:
            default: all
            type: string
            enum:
              - past
              - current
              - pending
              - all
      responses:
        "200":
          description: ""
      security: *a19
      summary: Flat rates per product type (current + pending)
      tags: *a20
    post:
      description: Requires commission:edit. greenfield_internet / tv / home_phone
        only (internet is tiered).
      operationId: CommissionController_createFlatRate_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlatRateDto"
      responses:
        "201":
          description: ""
      security: *a19
      summary: Set an effective-dated flat rate
      tags: *a20
  /v1/commission/holdback-config:
    get:
      description: Requires commission:view.
      operationId: CommissionController_listHoldbackConfig_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: *a19
      summary: Advance/holdback split (current + pending)
      tags: *a20
    patch:
      description: Requires commission:edit. advance_pct + holdback_pct must equal 1;
        back-dating → 422.
      operationId: CommissionController_setHoldbackConfig_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHoldbackConfigDto"
      responses:
        "200":
          description: ""
      security: *a19
      summary: Set an effective-dated advance/holdback split
      tags: *a20
  /v1/commission/holdback-release-setting:
    get:
      description: Requires commission:view. PROPOSED/pending Redwave confirmation;
        stored only.
      operationId: CommissionController_getReleaseSetting_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: *a19
      summary: Holdback-release setting (current sticky) — PROPOSED (SRS §17)
      tags: *a20
    patch:
      description: "Requires commission:edit. PROPOSED/pending Redwave confirmation:
        release_rule is stored only; its interpretation (which cycle the 30%
        releases into) is deferred to the Pay Run module."
      operationId: CommissionController_setReleaseSetting_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHoldbackReleaseSettingDto"
      responses:
        "200":
          description: ""
      security: *a19
