        "401":
          description: Unauthorized — missing/invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelopeDto"
        "403":
          description: Forbidden — RBAC denied
          content:
            application/json:
              schema:
