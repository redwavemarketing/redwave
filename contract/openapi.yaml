        "422":
          description: Unprocessable Entity — domain rule violated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelopeDto"
      security:
        - bearer: []
      summary: List active currencies (catalogue)
      tags:
        - Currencies
