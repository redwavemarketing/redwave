    CreateIncentiveDto:
      type: object
      properties:
        name:
          type: string
          example: July VF Internet Spiff
        scope_client_id:
          type: string
          description: Scope to a client; omit/null = all clients.
        scope_product_type:
          type: string
          example: tv
          description: Scope to a product-type catalogue key; omit/null = all.
        target_type:
          type: string
          enum:
            - per_activation
            - one_time
          description: per_activation — bonus on each matching activation BEYOND
            target_count (null/0 = every activation). one_time — a single bonus
            once the rep reaches target_count matching activations (requires
            target_count).
        target_count:
          type: number
          example: 5
          description: "The threshold. per_activation: pay beyond it (optional). one_time:
            reach it (required)."
        window_start:
          type: string
          example: 2026-07-01
          description: YYYY-MM-DD inclusive.
        window_end:
          type: string
          example: 2026-07-31
          description: YYYY-MM-DD inclusive.
        amount:
          type: string
          example: "20.00"
          description: Per-activation bonus — exact decimal STRING.
      required:
        - name
        - target_type
        - window_start
        - window_end
        - amount
    UpdateIncentiveDto:
      type: object
      properties:
        name:
          type: string
        amount:
          type: string
          example: "25.00"
        status:
          type: string
          enum:
            - active
            - ended
          description: Set ended to retire the incentive.
    ProductTypeResponse:
      type: object
      properties:
        key:
          type: string
          example: internet
          description: Immutable catalogue key.
        label:
          type: string
          example: Internet
        behaviour:
          type: string
          enum:
            - tiered
            - greenfield
            - standard_addon
        is_system:
          type: boolean
          description: A core type — behaviour locked, cannot be deleted/deactivated.
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
        - key
        - label
        - behaviour
        - is_system
        - is_active
        - created_at
    InitialFlatRateDto:
      type: object
