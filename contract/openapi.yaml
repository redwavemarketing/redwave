        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "201":
          description: ""
      security: *a43
      summary: Cancel a signature request
      tags: *a44
  /v1/imports:
    post:
      description: Requires import:create. Stages + classifies rows (file upload
        stubbed — rows fed in the body). Nothing is written to live tables until
        commit.
      operationId: ImportController_create_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateImportDto"
      responses:
        "201":
          description: ""
      security: &a45
        - bearer: []
      summary: Create a staged import batch
      tags: &a46
        - Data Import & Integration
    get:
      description: Requires import:view.
      operationId: ImportController_list_v1
      parameters:
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - staged
              - committed
              - failed
              - cancelled
        - name: source_type
          required: false
          in: query
          schema:
            type: string
            enum:
              - client_report
              - master_migration
              - balance_migration
        - name: import_type
          required: false
          in: query
          schema:
            type: string
            enum:
              - reps
              - clients
              - products
              - sales
              - holdback
              - clawback
              - mixed
      responses:
        "200":
          description: ""
      security: *a45
      summary: Import/migration history
      tags: *a46
  /v1/imports/{id}:
    get:
      description: Requires import:view. Rows with match status, counts, and reconcile
        total.
      operationId: ImportController_findOne_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a45
      summary: Preview a staged batch
      tags: *a46
  /v1/imports/{id}/reconcile:
    post:
      description: "Requires import:edit. Resolutions: match / edit / ignore.
        Recomputes counts."
      operationId: ImportController_reconcile_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconcileDto"
      responses:
        "201":
          description: ""
      security: *a45
      summary: Resolve unmatched/ambiguous rows
      tags: *a46
  /v1/imports/{id}/commit:
    post:
      description: Requires import:approve. Blocked (422) while any row is unresolved
        (balance migrations must also reconcile to the source total). Applies
        all rows in ONE transaction; re-commit is a no-op.
      operationId: ImportController_commit_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "201":
          description: ""
      security: *a45
      summary: Commit the batch (atomic + idempotent; reconcile-gated)
      tags: *a46
  /v1/dashboards/rep:
    get:
      description: Authenticated; scoped to the caller’s own rep.
      operationId: DashboardsController_rep_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a47
        - bearer: []
      summary: Rep's own dashboard
      tags: &a48
        - Reporting & Dashboards
  /v1/dashboards/manager:
    get:
      description: Requires reports:view; scoped to the caller’s roster (bare rep → 403).
      operationId: DashboardsController_manager_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: *a47
      summary: Manager dashboard
      tags: *a48
  /v1/dashboards/business:
    get:
      description: Requires reports:view AND Super Admin (else 403).
      operationId: DashboardsController_business_v1
      parameters:
        - name: pay_period_id
          required: false
          in: query
          description: Restrict to one pay period.
          schema:
            type: string
        - name: date_from
          required: false
          in: query
          schema:
            example: 2026-01-01
            type: string
        - name: date_to
          required: false
          in: query
          schema:
            example: 2026-03-31
            type: string
      responses:
        "200":
          description: ""
      security: *a47
      summary: Business / executive dashboard
      tags: *a48
  /v1/dashboards/admin:
    get:
      description: Requires reports:view AND Admin/Super Admin.
      operationId: DashboardsController_admin_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: *a47
      summary: Admin operational home (queues)
      tags: *a48
  /v1/leaderboard:
    get:
      description: Requires reports:view. Ranked by internet activation count for the
        period — no earnings.
      operationId: LeaderboardController_list_v1
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - bearer: []
      summary: Company-wide leaderboard (counts only)
      tags:
        - Reporting & Dashboards
  /v1/notifications:
    get:
      description: Authenticated; returns only the caller’s own notifications.
      operationId: NotificationsController_list_v1
      parameters:
        - name: is_read
          required: false
          in: query
          description: Filter by read/unread.
          schema:
            type: boolean
      responses:
        "200":
          description: ""
      security: &a49
        - bearer: []
      summary: My notifications
      tags: &a50
        - Reporting & Dashboards
  /v1/notifications/{id}/read:
    patch:
      description: Authenticated; only the caller’s own notification.
      operationId: NotificationsController_markRead_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
      security: *a49
      summary: Mark a notification read
      tags: *a50
  /v1/notification-settings:
    get:
      description: Requires settings:view (Super Admin).
      operationId: NotificationSettingsController_list_v1
      parameters: []
      responses:
        "200":
          description: ""
      security: &a51
        - bearer: []
      summary: Notification event settings
      tags: &a52
        - Reporting & Dashboards
    patch:
      description: Requires settings:edit (Super Admin). Per-event in-app/email
        toggles; NO per-user override.
      operationId: NotificationSettingsController_update_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationSettingsDto"
      responses:
        "200":
          description: ""
      security: *a51
      summary: Configure event×channel settings
      tags: *a52
  /v1/chatbot/query:
    post:
      description: Authenticated. Answers from Redwave data within the caller’s scope
        only; the LLM is stubbed.
      operationId: ChatbotController_query_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatbotQueryDto"
      responses:
        "201":
          description: ""
      security:
        - bearer: []
      summary: Ask the read-only assistant
      tags:
        - Reporting & Dashboards
info:
  title: Redwave ERP / HRM API
  description: Versioned REST contract for the Redwave platform. Each protected
    endpoint notes the required (module, action) permission enforced server-side
    by the RBAC guard.
  version: "1.0"
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: superadmin@redwave.local
        password:
          type: string
          example: DevSuperAdmin!123
          writeOnly: true
      required:
        - email
        - password
    RefreshDto:
      type: object
      properties:
        refresh_token:
          type: string
          description: A valid refresh token previously issued by /auth/login.
      required:
        - refresh_token
    CreateUserDto:
      type: object
      properties:
        email:
          type: string
          example: jane@redwave.local
        password:
          type: string
          writeOnly: true
          minLength: 8
        full_name:
          type: string
          example: Jane Doe
        phone:
          type: string
        avatar_url:
          type: string
        role_ids:
          description: Role ids to assign on creation.
          type: array
          items:
            type: string
      required:
        - email
        - password
        - full_name
    UpdateUserDto:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
          description: Set inactive to deactivate (immediate revoke).
    SetUserRolesDto:
      type: object
      properties:
        role_ids:
          description: The complete set of role ids the user should hold.
          type: array
          items:
            type: string
      required:
        - role_ids
    CreateRoleDto:
      type: object
      properties:
        name:
          type: string
          example: General Manager
        description:
          type: string
        permission_ids:
          description: Initial permission ids to grant.
          type: array
          items:
            type: string
      required:
        - name
    UpdateRoleDto:
      type: object
      properties:
        name:
          type: string
          description: Rename the role. Built-in roles cannot be renamed.
        description:
          type: string
    SetRolePermissionsDto:
      type: object
      properties:
        permission_ids:
          description: The complete set of permission ids the role should hold.
          type: array
          items:
            type: string
      required:
        - permission_ids
    ChangePasswordDto:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
        - current_password
        - new_password
    SetThemeDto:
      type: object
      properties:
        theme_preference:
          type: string
          enum:
            - light
            - dark
            - system
          description: Applies immediately — no review (AUTH-010).
      required:
        - theme_preference
    ProfileChangeRequestDto:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
    CreateClientDto:
      type: object
      properties:
        client_code:
          type: string
          example: VF
          description: Unique client code (e.g. VF / RF / CTI).
        name:
          type: string
          example: Valley Fiber
        market:
          type: string
          enum:
            - CA
            - US
        supplies_mpu_id:
          type: boolean
          description: Whether the partner supplies per-house MPU IDs.
      required:
        - client_code
        - name
        - market
        - supplies_mpu_id
    UpdateClientDto:
      type: object
      properties:
        client_code:
          type: string
        name:
          type: string
        market:
          type: string
          enum:
            - CA
            - US
        supplies_mpu_id:
          type: boolean
        is_active:
          type: boolean
          description: Set false to deactivate (soft — history preserved).
    CreateProductDto:
      type: object
      properties:
        name:
          type: string
          example: Fibre 1gig
        product_type:
          type: string
          enum:
            - internet
            - greenfield_internet
            - tv
            - home_phone
      required:
        - name
        - product_type
    CreateBillingRateDto:
      type: object
      properties:
        product_id:
          type: string
          description: Product the rate applies to. Omit for add-on rate kinds.
        rate_kind:
          type: string
          enum:
            - product
            - tv_addon
            - hp_addon
            - bundle_bonus
            - spiff
        amount:
          type: string
          example: "49.99"
          description: Exact decimal STRING (≤2 dp). Never a float.
        effective_from:
          type: string
          example: 2026-07-01
          description: YYYY-MM-DD; must be today or future.
        effective_to:
          type: string
          example: 2026-12-31
          description: YYYY-MM-DD; null = open-ended.
      required:
        - rate_kind
        - amount
        - effective_from
    UpdateProductDto:
      type: object
      properties:
        name:
          type: string
        is_active:
          type: boolean
          description: Set false to deactivate (soft — history preserved).
    CreateRepDto:
      type: object
      properties:
        rep_code:
          type: string
          example: Redwave07
          description: Unique rep code. Never reused — even after termination.
        full_name:
          type: string
          example: Jordan Field
        field_manager_id:
          type: string
          description: User id of the Field Manager (must hold the Manager role).
        hire_date:
          type: string
          example: 2026-01-15
          description: YYYY-MM-DD.
        user_id:
          type: string
          description: Optional linked login user (source of contact info).
        payment_details:
          type: object
          description: Sensitive banking / e-transfer details (role-gated).
      required:
        - rep_code
        - full_name
        - field_manager_id
        - hire_date
    UpdateRepDto:
      type: object
      properties:
        full_name:
          type: string
        field_manager_id:
          type: string
          description: Reassign the Field Manager (must hold the Manager role).
        hire_date:
          type: string
          example: 2026-01-15
        user_id:
          type: string
        payment_details:
          type: object
        status:
          type: string
          enum:
            - active
            - terminated
          description: terminated requires termination_date.
        termination_date:
          type: string
          example: 2026-06-30
          description: Required when status=terminated.
    CreateRepDocumentDto:
      type: object
      properties:
        doc_type:
          type: string
          example: contract
          description: e.g. contract, id, equipment_agreement.
        file_url:
          type: string
          description: Object-storage reference (URL/key) of the stored file.
      required:
        - doc_type
        - file_url
    CreateRepEquipmentDto:
      type: object
      properties:
        equipment_type:
          type: string
          example: iPad
        identifier:
          type: string
          example: SN-12345
          description: Serial / asset tag.
        deposit_amount:
          type: string
          example: "250.00"
          description: Deposit held — exact decimal STRING, never a float.
        assigned_date:
          type: string
          example: 2026-01-15
          description: YYYY-MM-DD.
      required:
        - equipment_type
        - identifier
        - deposit_amount
        - assigned_date
    UpdateRepEquipmentDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - assigned
            - returned
            - withheld
          description: assigned → returned / withheld.
        returned_date:
          type: string
          example: 2026-06-30
          description: Defaults to today when status=returned.
    TierBracketDto:
      type: object
      properties:
        tier_number:
          type: number
          example: 4
          description: 1 = highest .. 4 = entry.
        min_count:
          type: number
          example: 0
          description: Inclusive lower bound of the gross internet tally.
        max_count:
          type: object
          example: 6
          description: Inclusive upper bound; null = open-ended (36+).
        rate_per_activation:
          type: string
          example: "110.00"
          description: Exact decimal STRING — never a float.
      required:
        - tier_number
        - min_count
        - rate_per_activation
    CreateTierScheduleDto:
      type: object
      properties:
        effective_from:
          type: string
          example: 2026-07-01
          description: YYYY-MM-DD; must be today or future.
        effective_to:
          type: string
          example: 2026-12-31
          description: YYYY-MM-DD; null = open-ended.
        tiers:
          description: The full tier schedule (contiguous, one open top bracket).
          type: array
          items:
            $ref: "#/components/schemas/TierBracketDto"
      required:
        - effective_from
        - tiers
    CreateFlatRateDto:
      type: object
      properties:
        product_type:
          type: string
          enum:
            - internet
            - greenfield_internet
            - tv
            - home_phone
          description: Flat-rated product. internet is tiered (not allowed here).
        amount:
          type: string
          example: "30.00"
          description: Exact decimal STRING — never a float.
        effective_from:
          type: string
          example: 2026-07-01
          description: YYYY-MM-DD; must be today or future.
        effective_to:
          type: string
          example: 2026-12-31
      required:
        - product_type
        - amount
        - effective_from
    SetHoldbackConfigDto:
      type: object
      properties:
        advance_pct:
          type: string
          example: "0.7000"
          description: Advance fraction (0..1), decimal STRING.
        holdback_pct:
          type: string
          example: "0.3000"
          description: Holdback fraction; advance_pct + holdback_pct must = 1.
        effective_from:
          type: string
          example: 2026-07-01
          description: YYYY-MM-DD; must be today or future.
        effective_to:
          type: string
          example: 2026-12-31
      required:
        - advance_pct
        - holdback_pct
        - effective_from
    SetHoldbackReleaseSettingDto:
      type: object
      properties:
        release_rule:
          type: string
          example: next_cycle_after_30_days
          description: "PROPOSED (SRS §17): free-form release rule, stored only.
            Interpretation deferred to Pay Run."
      required:
        - release_rule
    CreateIncentiveDto:
      type: object
      properties:
        name:
          type: string
          example: July VF Internet Spiff
        scope_client_id:
          type: string
          description: Scope to a client; omit/null = all clients.
        scope_product_type:
          type: string
          enum:
            - internet
            - greenfield_internet
            - tv
            - home_phone
          description: Scope to a product type; omit/null = all.
        target_type:
          type: string
          enum:
            - per_activation
            - target_based
          description: per_activation is computed by the engine. target_based is MODELED
            but DEFERRED (not yet applied — CLAUDE §12); requires target_count.
        target_count:
          type: number
          example: 5
          description: Required for target_based (e.g. 5 sales in 1 day).
        window_start:
          type: string
          example: 2026-07-01
          description: YYYY-MM-DD inclusive.
        window_end:
          type: string
          example: 2026-07-31
          description: YYYY-MM-DD inclusive.
        amount:
          type: string
          example: "20.00"
          description: Per-activation bonus — exact decimal STRING.
      required:
        - name
        - target_type
        - window_start
        - window_end
        - amount
    UpdateIncentiveDto:
      type: object
      properties:
        name:
          type: string
        amount:
          type: string
          example: "25.00"
        status:
          type: string
          enum:
            - active
            - ended
          description: Set ended to retire the incentive.
    SaleItemInput:
      type: object
      properties:
        product_id:
          type: string
          description: A product belonging to the sale’s client (active).
      required:
        - product_id
    CreateSaleDto:
      type: object
      properties:
        client_id:
          type: string
          description: The client (must be an existing active client).
        rep_id:
          type: string
          description: Rep the sale belongs to. Defaults to the caller’s own rep;
            scope-authorized.
        sale_date:
          type: string
          example: 2026-01-10
          description: YYYY-MM-DD. Defaults to today. GOVERNS the pay period.
        activation_date:
          type: string
          example: 2026-01-15
          description: YYYY-MM-DD. Reference only — drives no logic.
        customer_name:
          type: string
        street:
          type: string
        city:
          type: string
        province_state:
          type: string
        postal_code:
          type: string
        mpu_id:
          type: string
          description: Client house ID, where supplied (some clients do not provide one).
        is_greenfield:
          type: boolean
          description: Rep’s greenfield REQUEST at entry; an admin confirms/clears at
            validation.
        items:
          description: One or more products on this sale.
          type: array
          items:
            $ref: "#/components/schemas/SaleItemInput"
      required:
        - client_id
        - customer_name
        - street
        - city
        - province_state
        - postal_code
        - items
    BulkValidateDto:
      type: object
      properties:
        sale_ids:
          description: Sale ids to validate. Non-entered sales are reported, not thrown.
          type: array
          items:
            type: string
      required:
        - sale_ids
    UpdateSaleDto:
      type: object
      properties:
        customer_name:
          type: string
        street:
          type: string
        city:
          type: string
        province_state:
          type: string
        postal_code:
          type: string
        activation_date:
          type: string
          example: 2026-01-15
          description: YYYY-MM-DD. Reference only.
    ValidateSaleDto:
      type: object
      properties:
        is_greenfield:
          type: boolean
          description: "Optional: confirm (true) or clear (false) greenfield while
            validating."
    SetGreenfieldDto:
      type: object
      properties:
        is_greenfield:
          type: boolean
          description: true = confirmed greenfield (internet excluded from tally); false =
            cleared.
      required:
        - is_greenfield
    CreateClawbackDto:
      type: object
      properties:
        sale_item_id:
          type: string
          description: The cancelled, already-paid sale_item to claw back.
        reason:
          type: string
          example: Customer cancelled within contract window.
        reported_date:
          type: string
          example: 2026-03-15
          description: Client-reported cancellation date (record only; drives no logic).
        amount:
          type: string
          example: "30.00"
          description: Override the snapshot-derived amount (editable with permission).
            Decimal string, never float.
      required:
        - sale_item_id
        - reason
        - reported_date
    KmStopInput:
      type: object
      properties:
        stop_order:
          type: number
          example: 0
          description: Order of this stop along the route (0-based).
        address:
          type: string
          example: 123 Main St, Winnipeg
        lat:
          type: string
          example: "49.895100"
          description: Latitude (decimal string).
        lng:
          type: string
          example: "-97.138400"
          description: Longitude (decimal string).
      required:
        - stop_order
        - address
        - lat
        - lng
    KmLogInput:
      type: object
      properties:
        trip_type:
          type: string
          enum:
            - single
            - round
          example: round
        total_km:
          type: string
          example: "130.00"
          description: Route's total driven distance in km (decimal string).
        stops:
          type: array
          items:
            $ref: "#/components/schemas/KmStopInput"
      required:
        - trip_type
        - total_km
        - stops
    ExpenseItemInput:
      type: object
      properties:
        category:
          type: string
          enum:
            - km
            - meals
            - hotel
            - flight
            - rental
            - gas
            - other
          example: meals
        client_id:
          type: string
          description: Optional client this expense is attributed to.
        expense_date:
          type: string
          example: 2026-03-10
        amount:
          type: string
          example: "42.50"
          description: Amount (decimal string). Required for non-km items; ignored for km
            (computed).
        description:
          type: string
          example: Lunch with client
        receipt_url:
          type: string
          description: Object-storage reference; mandatory per the category config.
        km:
          description: Required for `km` items; forbidden otherwise.
          allOf:
            - $ref: "#/components/schemas/KmLogInput"
      required:
        - category
        - expense_date
        - description
    CreateReportDto:
      type: object
      properties:
        week_start:
          type: string
          example: 2026-03-09
          description: Week start (governs the pay period).
        week_end:
          type: string
          example: 2026-03-15
        rep_id:
          type: string
          description: Rep this report is for; defaults to the submitter’s linked rep.
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseItemInput"
      required:
        - week_start
        - week_end
        - items
    UpdateReportDto:
      type: object
      properties:
        week_start:
          type: string
          example: 2026-03-09
        week_end:
          type: string
          example: 2026-03-15
        items:
          description: Replaces all lines when provided.
          type: array
          items:
            $ref: "#/components/schemas/ExpenseItemInput"
    ReviewDto:
      type: object
      properties:
        decision:
          type: string
          enum:
            - approve
            - reject
            - send_back
        note:
          type: string
          description: Optional note (reason for rejection / send-back).
      required:
        - decision
    CreateFieldConfigDto:
      type: object
      properties:
        category_key:
          type: string
          example: parking
          description: Snake_case category key (unique).
        label:
          type: string
          example: Parking
        requires_receipt:
          type: boolean
          example: true
          description: Whether items in this category require a receipt.
        is_active:
          type: boolean
          example: true
          default: true
      required:
        - category_key
        - label
        - requires_receipt
    CreateExportDto:
      type: object
      properties:
        format:
          type: string
          enum:
            - pdf
            - excel
          example: excel
        client_id:
          type: string
          description: Restrict to one client.
        pay_period_id:
          type: string
          description: Restrict to one pay period.
      required:
        - format
    CreatePayRunDto:
      type: object
      properties:
        pay_period_id:
          type: string
          description: The pay period to run (must be pre-loaded).
      required:
        - pay_period_id
    SetBonusDto:
      type: object
      properties:
        amount:
          type: string
          example: "50.00"
          description: Bonus amount — exact decimal STRING, never a float.
        note:
          type: string
          description: Reason / note for the bonus.
      required:
        - amount
    ExportPayRunDto:
      type: object
      properties:
        format:
          type: string
          enum:
            - csv
            - json
          default: csv
          description: Export format.
    GenerateBillingDto:
      type: object
      properties:
        pay_period_id:
          type: string
          description: "The pay period to bill (governs which sales by sale_date, #7)."
      required:
        - pay_period_id
    BillingExportDto:
      type: object
      properties:
        format:
          type: string
          enum:
            - pdf
            - excel
          example: excel
      required:
        - format
    CreateDocumentDto:
      type: object
      properties:
        title:
          type: string
          example: Compensation Agreement 2026
        doc_type:
          type: string
          enum:
            - compensation_agreement
            - rate_notice
            - equipment
            - other
          example: compensation_agreement
      required:
        - title
        - doc_type
    CreateSignatureRequestDto:
      type: object
      properties:
        recipient_user_ids:
          description: User ids to request a signature from (≥1).
          type: array
          items:
            type: string
        message:
          type: string
          example: Please review and sign by Friday.
        due_date:
          type: string
          example: 2026-06-30
          description: Optional due date (record only).
      required:
        - recipient_user_ids
    SignDto:
      type: object
      properties:
        decision:
          type: string
          enum:
            - sign
            - decline
        method:
          type: string
          example: typed
          description: Signature method (typed / drawn / …).
      required:
        - decision
    CreateImportDto:
      type: object
      properties:
        source_type:
          type: string
          enum:
            - client_report
            - master_migration
            - balance_migration
          example: client_report
        import_type:
          type: string
          enum:
            - reps
            - clients
            - products
            - sales
            - holdback
            - clawback
            - mixed
          example: sales
        client_id:
          type: string
          description: Client scope (required for client_report).
        field_mapping_id:
          type: string
          description: A saved field mapping to apply to each row.
        reconcile_total:
          type: string
          example: "48200.00"
          description: Operator-provided source total (required to commit a balance
            migration). Decimal string.
        rows:
          description: Raw source rows (file upload stubbed). Each is an arbitrary
            key→value object.
          type: array
          items:
            type: object
      required:
        - source_type
        - import_type
        - rows
    RowResolution:
      type: object
      properties:
        row_id:
          type: string
          description: The import row to resolve.
        action:
          type: string
          enum:
            - match
            - edit
            - ignore
        matched_entity_id:
          type: string
          description: "For 'match': the live entity to match this row to."
        mapped_data:
          type: object
          description: "For 'edit': corrected mapped data (re-classified)."
      required:
        - row_id
        - action
    ReconcileDto:
      type: object
      properties:
        resolutions:
          type: array
          items:
            $ref: "#/components/schemas/RowResolution"
      required:
        - resolutions
    EventSettingInput:
      type: object
      properties:
        event_type:
          type: string
          example: rate_change
        in_app_enabled:
          type: boolean
          example: true
        email_enabled:
          type: boolean
          example: false
      required:
        - event_type
        - in_app_enabled
        - email_enabled
    UpdateNotificationSettingsDto:
      type: object
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/EventSettingInput"
      required:
        - settings
    ChatbotQueryDto:
      type: object
      properties:
        prompt:
          type: string
          example: How many sales do I have this period?
      required:
        - prompt
