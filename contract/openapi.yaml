        stops:
          type: array
          items:
            $ref: "#/components/schemas/KmStopInput"
      required:
        - trip_type
        - total_km
        - stops
    ExpenseItemInput:
      type: object
      properties:
        category:
          type: string
          enum: &a292
            - km
            - meals
            - hotel
            - flight
            - rental
            - gas
            - other
          example: meals
        client_id:
          type: string
          description: Optional client this expense is attributed to.
        expense_date:
          type: string
          example: 2026-03-10
          description: Governs the payout pay period (EXP-009).
        amount:
          type: string
          example: "42.50"
          description: Amount (decimal string) in `currency`. Required for non-km items;
            ignored for km (server-computed, CAD).
        currency:
          type: string
          example: CAD
          description: Currency the amount is in (ISO 4217; default CAD). A foreign amount
            freezes its FX rate + CAD value at APPROVAL (#12). km items are
            always CAD.
        is_personal:
          type: boolean
          description: Personal / do-not-reimburse (EXP-012). Excluded from the
            reimbursable total, the pay run, and all client output. Default
            false.
        tags:
          description: Custom free-form tags (client + channel, EXP-002a). Up to 20 tags,
            ≤50 chars each.
          type: array
          items:
            type: string
        description:
          type: string
          example: Lunch with client
        receipt_url:
          type: string
          description: Object-storage reference (from the receipt upload); mandatory per
            the category config.
        km:
          description: Required for `km` items; forbidden otherwise.
          allOf:
