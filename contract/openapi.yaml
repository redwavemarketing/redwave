info:
  title: Redwave ERP / HRM API
  description: Versioned REST contract for the Redwave platform. Each protected
    endpoint notes the required (module, action) permission enforced server-side
    by the RBAC guard.
  version: "1.0"
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    ErrorBodyDto:
      type: object
      properties:
        code:
          type: string
          example: UNPROCESSABLE_ENTITY
          description: Stable machine code for the error.
        message:
          type: string
          example: tier brackets must be contiguous (each min_count = previous max_count +
            1)
        details:
          type: object
          description: Optional structured detail (e.g. validation messages, an
            unpriced-products list).
          additionalProperties: true
      required:
        - code
        - message
    ErrorEnvelopeDto:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorBodyDto"
      required:
        - error
    CurrencyResponse:
      type: object
      properties:
        code:
          type: string
          example: CAD
          description: ISO 4217 code (the catalogue key).
        name:
          type: string
          example: Canadian Dollar
        symbol:
          type: string
          example: $
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
        - code
        - name
        - symbol
        - is_active
        - created_at
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: superadmin@redwave.local
        password:
          type: string
          example: DevSuperAdmin!123
          writeOnly: true
      required:
        - email
        - password
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          nullable: true
          description: Short-lived access JWT (Bearer). Absent when mfa_required is true.
        csrf_token:
          type: string
          nullable: true
          description: The CSRF token (also set as the readable rw_csrf cookie). Echo it
            in the X-CSRF-Token header.
        must_change_password:
          type: boolean
          nullable: true
          description: When true, the user must change their password before continuing.
        mfa_enrollment_required:
          type: boolean
          nullable: true
          description: When true, policy requires this user to enrol in MFA before
            continuing.
        mfa_required:
          type: boolean
          nullable: true
          description: When true, the user has MFA enabled — redeem mfa_token at
            /auth/mfa/verify.
        mfa_token:
          type: string
          nullable: true
          description: Short-lived MFA challenge token (when mfa_required).
    MfaVerifyDto:
      type: object
      properties:
        mfa_token:
          type: string
          description: The mfa_token returned by /auth/login when mfa_required is true.
        code:
          type: string
          description: A 6-digit TOTP code from the authenticator app, or a recovery code.
      required:
        - mfa_token
        - code
    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
      required:
        - access_token
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          example: jane@redwave.local
      required:
        - email
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
      required:
        - success
    ResetPasswordDto:
      type: object
      properties:
        token:
          type: string
          description: The token from the emailed link.
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
      required:
        - token
        - new_password
    MeUserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        theme_preference:
          type: string
          enum:
            - light
            - dark
            - system
        status:
          type: string
          enum:
            - active
            - inactive
        must_change_password:
          type: boolean
          description: When true, the user must change their password before continuing.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - email
        - full_name
        - phone
        - avatar_url
        - theme_preference
        - status
        - must_change_password
        - created_at
        - updated_at
    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/MeUserResponse"
        roles:
          description: Role names held by the user.
          type: array
          items:
            type: string
        is_super_admin:
          type: boolean
        rep_id:
          type: string
          nullable: true
          description: Linked rep id, if the user is also a rep.
        effective_permissions:
          description: Union of the user roles’ permission keys (moduleKey:action).
          type: array
          items:
            type: string
        mfa_enrollment_required:
          type: boolean
          description: When true, policy requires this user to enrol in MFA before
            continuing.
      required:
        - user
        - roles
        - is_super_admin
        - rep_id
        - effective_permissions
        - mfa_enrollment_required
    MfaStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether TOTP MFA is currently enabled for the caller.
      required:
        - enabled
    MfaSetupResponse:
      type: object
      properties:
        otpauth_url:
          type: string
          description: otpauth:// provisioning URI for manual entry.
        qr_data_url:
          type: string
          description: A data-URL PNG QR code encoding the otpauth URI.
        secret:
          type: string
          description: The base32 secret (for manual entry if the QR cannot be scanned).
      required:
        - otpauth_url
        - qr_data_url
        - secret
    MfaCodeDto:
      type: object
      properties:
        code:
          type: string
          description: A 6-digit TOTP code (or a recovery code where allowed).
      required:
        - code
    MfaRecoveryCodesResponse:
      type: object
      properties:
        recovery_codes:
          description: One-time recovery codes — shown ONCE. Store them safely.
          type: array
          items:
            type: string
      required:
        - recovery_codes
    SessionResponse:
      type: object
      properties:
        id:
          type: string
        user_agent:
          type: string
          nullable: true
          description: The browser/device user-agent string.
        ip_address:
          type: string
          nullable: true
          description: IP address last seen for this session.
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        is_current:
          type: boolean
          description: True for the session the caller is currently using.
      required:
        - id
        - user_agent
        - ip_address
        - created_at
        - last_used_at
        - expires_at
        - is_current
    RoleMfaResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mfa_required:
          type: boolean
      required:
        - id
        - name
        - mfa_required
    SecuritySettingsResponse:
      type: object
      properties:
        mfa_enforced:
          type: boolean
          description: Master MFA-enforcement switch.
        roles:
          description: Every role with its MFA-required flag.
          type: array
          items:
            $ref: "#/components/schemas/RoleMfaResponse"
      required:
        - mfa_enforced
        - roles
    RoleMfaDto:
      type: object
      properties:
        role_id:
          type: string
          description: Role id.
        mfa_required:
          type: boolean
          description: Whether members of this role must use MFA when enforcement is on.
      required:
        - role_id
        - mfa_required
    UpdateSecuritySettingsDto:
      type: object
      properties:
        mfa_enforced:
          type: boolean
          description: Master switch — when true, roles flagged mfa_required force
            enrollment at login.
        role_mfa:
          description: Per-role MFA-required flags to set.
          type: array
          items:
            $ref: "#/components/schemas/RoleMfaDto"
    UserRoleRoleResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
    UserRoleRefResponse:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/UserRoleRoleResponse"
      required:
        - role
    AdminUserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        theme_preference:
          type: string
          enum:
            - light
            - dark
            - system
        status:
          type: string
          enum:
            - active
            - inactive
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user_roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRoleRefResponse"
      required:
        - id
        - email
        - full_name
        - phone
        - avatar_url
        - theme_preference
        - status
        - created_at
        - updated_at
        - user_roles
    CreateUserDto:
      type: object
      properties:
        email:
          type: string
          example: jane@redwave.local
        password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
          description: Omit to INVITE the user — they receive an email link to set their
            own password.
        full_name:
          type: string
          example: Jane Doe
        phone:
          type: string
        avatar_url:
          type: string
        role_ids:
          description: Role ids to assign on creation.
          type: array
          items:
            type: string
      required:
        - email
        - full_name
    UpdateUserDto:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
          description: Set inactive to deactivate (immediate revoke).
    SetUserRolesDto:
      type: object
      properties:
        role_ids:
          description: The complete set of role ids the user should hold.
          type: array
          items:
            type: string
      required:
        - role_ids
    AdminResetPasswordDto:
      type: object
      properties:
        mode:
          type: string
          enum:
            - link
            - temp
          description: "'link' = email a reset link; 'temp' = email a temporary password
            that forces a change at next login."
      required:
        - mode
    RoleCountResponse:
      type: object
      properties:
        role_permissions:
          type: number
          description: Permissions granted to this role.
        user_roles:
          type: number
          description: Users holding this role.
      required:
        - role_permissions
        - user_roles
    RoleSummaryResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_system:
          type: boolean
          description: Built-in roles cannot be renamed/deleted.
        created_at:
          type: string
          format: date-time
        _count:
          $ref: "#/components/schemas/RoleCountResponse"
      required:
        - id
        - name
        - description
        - is_system
        - created_at
        - _count
    CreateRoleDto:
      type: object
      properties:
        name:
          type: string
          example: General Manager
        description:
          type: string
        permission_ids:
          description: Initial permission ids to grant.
          type: array
          items:
            type: string
      required:
        - name
    RolePermissionRefResponse:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
          example: clients:view
      required:
        - id
        - key
    RoleDetailResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/RolePermissionRefResponse"
      required:
        - id
        - name
        - description
        - is_system
        - created_at
        - permissions
    UpdateRoleDto:
      type: object
      properties:
        name:
          type: string
          description: Rename the role. Built-in roles cannot be renamed.
        description:
          type: string
    SetRolePermissionsDto:
      type: object
      properties:
        permission_ids:
          description: The complete set of permission ids the role should hold.
          type: array
          items:
            type: string
      required:
        - permission_ids
    ModuleResponse:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
          example: clients
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - id
        - key
        - name
        - description
    PermissionResponse:
      type: object
      properties:
        id:
          type: string
        module_id:
          type: string
        module_key:
          type: string
          example: clients
        action:
          type: string
          enum:
            - view
            - create
            - edit
            - approve
            - delete
            - export
            - broadcast
            - business
        key:
          type: string
          example: clients:view
      required:
        - id
        - module_id
        - module_key
        - action
        - key
    ProfileChangeFieldsResponse:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
    PendingRequestResponse:
      type: object
      properties:
        id:
          type: string
        proposed_changes:
          $ref: "#/components/schemas/ProfileChangeFieldsResponse"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - proposed_changes
        - created_at
    AccountProfileResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        theme_preference:
          type: string
          enum:
            - light
            - dark
            - system
        status:
          type: string
          enum:
            - active
            - inactive
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        change_pending:
          type: boolean
