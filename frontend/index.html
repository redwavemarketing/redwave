<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Brand favicon + app icons (generated by `npm run gen:icons` from public/favicon.svg). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#13213d" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1120" />
    <title>Redwave ERP / HRM</title>
    <!--
      No-flash theme boot — EXTERNALISED to /public/theme-boot.js (same-origin) so the production CSP can
      use `script-src 'self'` with no `unsafe-inline`. Runs BEFORE the app, so the first paint is themed.
    -->
    <script src="/theme-boot.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
